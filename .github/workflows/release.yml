name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - 'v*'

permissions:
  contents: write
  # packages: write
  # issues: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
      # More assembly might be required: Docker logins, GPG, etc. It all depends
      # on your needs.
      - uses: goreleaser/goreleaser-action@v6
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro':
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro'
          # distribution:
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

  ios:
    name: Build iOS (jailbreak)
    needs: goreleaser
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build & sign iOS
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
          export CC="$(xcrun --sdk iphoneos --find clang)"
          export CGO_CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0"
          export CGO_LDFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0"
          GOOS=ios GOARCH=arm64 CGO_ENABLED=1 \
            go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}'" -o gost ./cmd/gost
          brew install ldid-procursus
          ldid -r gost || true
          ldid -P -Sentitlements/platform.entitlements gost
          chmod +x gost

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ARCHIVE="gost_${VERSION}_ios_arm64.tar.gz"
          tar czf "${ARCHIVE}" gost
          gh release upload "${TAG}" "${ARCHIVE}" --clobber
